name: study_hours_flutter
description: "StudyHours - Calculate study hours and expected grades."
publish_to: 'none'

version: 1.0.0+1
# version: MARKETING_VERSION+BUILD_NUMBER
# Bump BUILD_NUMBER (+1, +2 …) for every TestFlight/App Store upload.
# Bump MARKETING_VERSION (1.0.1, 1.1.0 …) for user-visible releases.

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_app_check: ^0.3.2+4
  device_calendar: ^4.3.0
  timezone: ^0.9.4
  flutter_local_notifications: ^17.2.4
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/images/app_icon_android.png"
  image_path_ios: "assets/images/app_icon_ios.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#A8C8F0"
  adaptive_icon_foreground: "assets/images/app_icon_android.png"
